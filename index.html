<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="src/styles.css" />
    <title>Micaela Coria MG</title>
  </head>
  <body>
    <header class="header">
      <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
          <a class="navbar-brand navbar-brand-custom" href="#">Micaela Coria</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav">
            <div class="navbar-nav navbar-collapse-custom align-items-center">
              <a class="nav-link" href="#">Conocenos</a>
              <a class="nav-link" href="#">Servicios</a>
              <a class="nav-link" href="#">Precios</a>
              <a class="nav-link btn-presupuesto" href="#">Presupuestar</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <h1 class="hero-title">Dale vida a tu presencia digital.</h1>
                        <p class="hero-description">
                            Gestión estratégica y diseño creativo para que tu marca conecte con las personas, no solo con algoritmos.
                        </p>
                    </div>
                    <div class="col-md-6" id="contenedor-imagen-hero">
                        <img src="src/foto-hero.png" id="imagen-hero" alt="Hero Image" class="img-fluid" />
                    </div>
                </div>           
            </div>             
        </section>
    </main>

    <footer></footer>
  </body>
</html>
